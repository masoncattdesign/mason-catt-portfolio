<svg width="522" height="296" viewBox="0 0 522 296" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
  /* Spotlight sweep animations — each beam rocks at slightly different timing */
  .beam1 { transform-origin: 134px 296px; animation: sweep1 4s ease-in-out infinite; }
  .beam2 { transform-origin: 292px 296px; animation: sweep2 5.5s ease-in-out infinite; }
  .beam3 { transform-origin: 275px 296px; animation: sweep3 4.8s ease-in-out infinite; }
  .beam4 { transform-origin: 388px 296px; animation: sweep4 6s ease-in-out infinite; }
  .beam5 { transform-origin: 14px 296px;  animation: sweep5 5s ease-in-out infinite; }

  @keyframes sweep1 { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(5deg)} }
  @keyframes sweep2 { 0%,100%{transform:rotate(3deg)}  50%{transform:rotate(-5deg)} }
  @keyframes sweep3 { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(4deg)} }
  @keyframes sweep4 { 0%,100%{transform:rotate(4deg)}  50%{transform:rotate(-4deg)} }
  @keyframes sweep5 { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(6deg)} }

  /* Star twinkle — scale + opacity pulse, each at different delay/speed */
  .star-lg1  { transform-origin: 114.5px 46.5px; animation: twinkle 2.4s ease-in-out infinite 0s; }
  .star-md1  { transform-origin: 185px 88px;     animation: twinkle 3.1s ease-in-out infinite 0.6s; }
  .star-lg2  { transform-origin: 370px 84px;     animation: twinkle 2.8s ease-in-out infinite 1.1s; }
  .star-sm1  { transform-origin: 293.5px 54.5px; animation: twinkle 2s ease-in-out infinite 0.3s; }
  .star-sm2  { transform-origin: 440.5px 68.5px; animation: twinkle 3.4s ease-in-out infinite 1.5s; }
  .star-sm3  { transform-origin: 82.5px 83.5px;  animation: twinkle 2.6s ease-in-out infinite 0.9s; }
  .star-sm4  { transform-origin: 476.5px 83.5px; animation: twinkle 3s ease-in-out infinite 1.8s; }

  @keyframes twinkle {
    0%,100% { opacity:1; transform:scale(1); }
    40%     { opacity:0.2; transform:scale(0.55); }
    60%     { opacity:0.15; transform:scale(0.45); }
  }
</style>

